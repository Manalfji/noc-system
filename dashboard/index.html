
<!DOCTYPE html><html><head><meta charset="UTF-8"><title>NOC</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#0a0e1a,#1a1f3a);color:#e0e6ed;font-family:sans-serif;min-height:100vh}.header{background:rgba(16,20,40,.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,212,255,.1);padding:20px 40px;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:1.8em;background:linear-gradient(135deg,#00d4ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.status{display:flex;align-items:center;gap:10px;color:#00ff88}.status-dot{width:8px;height:8px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}.container{padding:30px 40px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:25px;margin-bottom:25px}.card{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:25px;transition:all .3s;position:relative;overflow:hidden}.card::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);animation:scan 4s infinite}@keyframes scan{0%{left:-100%}100%{left:100%}}.card:hover{transform:translateY(-5px);border-color:rgba(0,212,255,.3);box-shadow:0 20px 40px rgba(0,0,0,.3)}.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.card-title{font-size:1.2em;color:#00d4ff;display:flex;align-items:center;gap:10px}.card-icon{width:35px;height:35px;background:rgba(0,212,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2em}.metric{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.05)}.metric:last-child{border:none}.metric-label{font-size:.85em;color:rgba(224,230,237,.6);margin-bottom:5px}.metric-value{font-size:1.6em;font-weight:700;background:linear-gradient(135deg,#fff,#a0aec0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.status-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-size:.85em;font-weight:500}.status-online{background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.2)}.status-warning{background:rgba(255,170,0,.1);color:#ffaa00;border:1px solid rgba(255,170,0,.2)}.chart-container{height:200px;margin-top:15px}.chart-bar{display:flex;align-items:flex-end;justify-content:space-between;height:100%;gap:8px;padding:0 5px}.bar{flex:1;background:linear-gradient(to top,rgba(0,102,255,.8),rgba(0,212,255,.8));border-radius:6px 6px 0 0;transition:height .8s;min-height:5px}.progress-container{display:flex;justify-content:space-around;align-items:center;padding:20px 0}.progress-item{text-align:center}.progress-ring{width:120px;height:120px;position:relative}.progress-ring svg{transform:rotate(-90deg)}.progress-ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:8}.progress-ring-fill{fill:none;stroke:url(#gradient);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s}.progress-value{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8em;font-weight:700}.progress-label{margin-top:10px;font-size:.9em;color:rgba(224,230,237,.7)}</style></head><body><div class="header"><h1>🔧 NOC Dashboard Pro</h1><div class="status"><div class="status-dot"></div><span>System Online</span></div></div><div class="container"><div class="grid"><div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">🖥️</div>System Status</div><span
class="status-badge status-online">Healthy</span></div><div class="metric"><div class="metric-info"><span class="metric-label">CPU</span><span style="flex:1"></span><span class="metric-value" id="cpuValue">45%</span></div></div><div class="me
tric"><div class="metric-info"><span class="metric-label">RAM</span><span class="metric-value" id="memoryValue">6.2GB</span></div></div></div><div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">🌐</div>Network</div><span class="status-badge status-online">Connected</span></div><div class="metric"><span>Bandwidth In</span><span class="metric-value">2.4Gbps</span></div><div class="metric"><span>Bandwidth Out</span><span class="metric-value">1.8Gbps</span></div></div><div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">⚙️</div>Services</div><span class="status-badge status-warning">Warning</span></div><div class="metric"><span>Web Server</span><span class="status-badge status-online">Running</span></div><div class="metric"><span>Database</span><span class="status-badge status-online">Running</span></div><div class="metric"><span>Cache</span><span class="status-badge status-warning">Warning</span></div></div></div><div class="grid"><div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">📊</div>Traffic</div></div><div class="chart-container"><div class="chart-bar" id="trafficChart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:80%"></div><div class="bar" style="height:55%"></div><div class="bar" style="height:90%"></div></div></div></div><div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">💾</div>Resources</div></div><div class="progress-container"><div class="progress-item"><div class="progress-ring"><svg width="120" height="120"><defs><linearGradient id="gradient"><stop offset="0%" style="stop-color:#00d4ff"/><stop offset="100%" style="stop-color:#0066ff"/></linearGradient></defs><circle class="progress-ring-bg" cx="60" cy="60" r="52"/><circle class="progress-ring-fill" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="81.68" id="cpuRing"/></svg><div class="progress-value" id="cpuPercent">75%</div></div><div class="progress-label">CPU</div></div><div class="progress-item"><div class="progress-ring"><svg width="120" height="120"><circle class="progress-ring-bg" cx="60" cy="60" r="52"/><circle class="progress-ring-fill" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="130.69" id="ramRing"/></svg><div class="progress-value" id="ramPercent">60%</div></div><div class="progress-label">RAM</div></div></div></div></div></div><script>setInterval(()=>{document.getElementById('cpuValue').textContent=Math.floor(Math.random()*30+40)+'%';document.getElementById('memoryValue').textContent=(Math.random()*2+5).toFixed(1)+'GB';const cpu=Math.floor(Math.random()*30+40);document.getElementById('cpuPercent').textContent=cpu+'%';document.getElementById('cpuRing').style.strokeDashoffset=326.73*(1-cpu/100);const bars=document.querySelectorAll('.bar');bars.forEach(b=>b.style.height=Math.floor(Math.random()*60+40)+'%')},3000)</script></body></html>
