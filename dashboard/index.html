<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOC Dashboard Pro</title>
<style>
body { font-family: sans-serif; background: #0a0e1a; color: #fff; padding: 20px; }
.card { background: #1a1f2e; border-radius: 10px; padding: 20px; margin: 10px 0; }
.row { display: flex; justify-content: space-between; padding: 8px 0; }
.label { color: #888; }
.value { font-weight: bold; color: #00d4ff; }
.status { color: #0f0; }
.warning { color: #fa0; }
</style>
</head>
<body>
<h1>🔧 NOC Dashboard Pro</h1>
<p class="status">● System Online</p>

<div class="card">
<h3>System Status <span class="status">Healthy</span></h3>
<div class="row"><span class="label">CPU</span><span class="value">43%</span></div>
<div class="row"><span class="label">RAM</span><span class="value">5.8GB</span></div>
</div>

<div class="card">
<h3>Network <span class="status">Connected</span></h3>
<div class="row"><span class="label">Bandwidth In</span><span class="value">2.4Gbps</span></div>
<div class="row"><span class="label">Bandwidth Out</span><span class="value">1.8Gbps</span></div>
</div>

<div class="card">
<h3>Services <span class="warning">Warning</span></h3>
<div class="row"><span class="label">Web Server</span><span class="status">Running</span></div>
<div class="row"><span class="label">Database</span><span class="status">Running</span></div>
<div class="row"><span class="label">Cache</span><span class="warning">Warning</span></div>
</div>
</body>
</html>
